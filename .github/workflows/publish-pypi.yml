name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g. v0.10.19) — must already exist on the repo'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/socialia
    permissions:
      id-token: write   # OIDC for trusted publisher
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    # Sync a GitHub Release with every PyPI publish. Notes come from
    # CHANGELOG.md (section heading "## [VERSION]"); wheel + sdist
    # attach as release assets so users can audit what shipped without
    # cloning. Tag was already pushed (this workflow is *triggered by*
    # the tag); we just create the Release record on top of it.
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\\\[" v "\\\\]" {p=1; next}
            p && /^## \\[/ {exit}
            p
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v${VERSION}. See CHANGELOG.md for details." > release-notes.md
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \\
            --title "v${{ steps.notes.outputs.version }}" \\
            --notes-file release-notes.md \\
            dist/*
