name: import-smoke

# Catches "wheel installs but `import socialia` blows up at runtime"
# — separate from the full pytest suite so a broken entry-point fails
# fast without paying for the matrix. Companion to `tests` — confirms
# the bare package (no extras) is `pip install -e .`-able and
# `import socialia` succeeds. Catches `[project] dependencies`
# drift that the test matrix masks because it installs `[all,dev]`.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  install-check:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (no extras)
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .
      - name: Import smoke
        run: .venv/bin/python -c "import socialia; print(socialia.__version__)"
